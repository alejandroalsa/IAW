---
- name: Playbook configurar SSL
  hosts: SERVER
  become: true
  # vars_files:
  #   - ./variables/variables.yml

  vars:

    - prestashop_version: 8.0.0
    - prestashop_url_descarga: "https://github.com/PrestaShop/PrestaShop/releases/download/8.0.0/prestashop_{{ prestashop_version }}.zip"
    - prestashop_directorio: "/var/www/html/"
    - prestashop_db_create: 1
    - prestashop_db_clear: 1
    - prestashop_dominio: "alejandroalsashop.3utilities.com"
    - prestashop_db_ip_server: 127.0.0.1
    - prestashop_db_engine: "InnoDB"
    - prestashop_db_nombre: "Prestashop"
    - prestashop_db_usuario: "usuario_prestashop"
    - prestashop_db_pass: "e69IY!71sgl4DlN"
    - prestashop_db_prefijo: "ps_"
    - prestashop_idiaoma: "es"
    - prestashop_pais: "es"
    - prestashop_zona_horaria: "Europe/Madrid"
    - prestashop_ssl: 1
    - prestashop_nombre_tienda: "Mi tienda"
    - prestashop_nombre: "Alejandro"
    - prestashop_apellido: "Alfaro"
    - prestashop_pass: "wI7A42$iJCBK*%R@"
    - prestashop_email: "alejandro@alejandroalsa.es"
    - prestashop_admin_nombre: "alejandroalsa"

    - STATS_USER_1: alejandroalsa
    - STATS_PASSWORD_USER_1: dNpy2F5u^4uJ^5q0OEGsBAlnO9JLB

  tasks:

    - name: Actualizando repositorios
      ansible.builtin.apt:
        update_cache: true

    - name: Instalando y actualizando snapd
      ansible.builtin.shell: snap install core; sudo snap refresh core


    - name: Eliminando instalación de Cerboot
      ansible.builtin.apt:
        name: certbot
        state: absent

    - name: Añadiendo AllowOverride al VirtualHost
      ansible.builtin.blockinfile:
        path: /etc/apache2/sites-available/000-default.conf
        block: |
            <Directory "/var/www/html/">
                AllowOverride ALL
            </Directory>

    - name: Instalando Cerboot
      community.general.snap:
        name: certbot
        classic: true

    - name: Creando un alias para Cerboot
      ansible.builtin.shell: ln -s /snap/bin/certbot /usr/bin/certbot

    - name: Obteniendo certificado SSL
      ansible.builtin.shell: certbot --apache -m {{ prestashop_email }} --agree-tos --no-eff-email -d {{ prestashop_dominio }}
