---
- name: Playbook para instalar la pila LAMP
  hosts: SERVER
  become: true
  # vars_files:
  #   - ./variables/variables.yml

  vars:

    - prestashop_version: 8.0.0
    - prestashop_url_descarga: "https://github.com/PrestaShop/PrestaShop/releases/download/8.0.0/prestashop_{{ prestashop_version }}.zip"
    - prestashop_directorio: "/var/www/html/"
    - prestashop_db_create: 1
    - prestashop_db_clear: 1
    - prestashop_dominio: "alejandroalsashop.3utilities.com"
    - prestashop_db_ip_server: 127.0.0.1
    - prestashop_db_engine: "InnoDB"
    - prestashop_db_nombre: "Prestashop"
    - prestashop_db_usuario: "usuario_prestashop"
    - prestashop_db_pass: "e69IY!71sgl4DlN"
    - prestashop_db_prefijo: "ps_"
    - prestashop_idiaoma: "es"
    - prestashop_pais: "es"
    - prestashop_zona_horaria: "Europe/Madrid"
    - prestashop_ssl: 1
    - prestashop_nombre_tienda: "Mi tienda"
    - prestashop_nombre: "Alejandro"
    - prestashop_apellido: "Alfaro"
    - prestashop_pass: "wI7A42$iJCBK*%R@"
    - prestashop_email: "alejandro@alejandroalsa.es"
    - prestashop_admin_nombre: "alejandroalsa"

    - STATS_USER_1: alejandroalsa
    - STATS_PASSWORD_USER_1: dNpy2F5u^4uJ^5q0OEGsBAlnO9JLB

  tasks:

    - name: Instalando phpmyadmin
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop:
        - phpmyadmin
        - php-mbstring
        - php-zip
        - php-gd
        - php-json
        - php-curl


    - name: Creacion de directorio de Adminer
      ansible.builtin.file:
        path: /var/www/html/adminer
        owner: www-data
        group: www-data
        mode: 0755
        state: directory

    - name: Descargando Adminer
      ansible.builtin.get_url:
        url: https://github.com/vrana/adminer/releases/download/v4.8.1/adminer-4.8.1-mysql.php
        dest: /var/www/html/adminer

    - name: Renombrando adminer-4.8.1-mysql.php -> index.php
      shell: mv /var/www/html/adminer/adminer-4.8.1-mysql.php  /var/www/html/adminer/index.php


    - name: Añadiendo repositorio de GoAccess
      ansible.builtin.apt_repository:
        repo: deb http://deb.goaccess.io/ $(lsb_release -cs) main
        state: present
        filename: /etc/apt/sources.list.d/goaccess.list

    - name: Actualizando repositorios
      apt:
        update_cache: true

    - name: Instalando GoAccess
      apt:
        name: apache2
        state: present

    - name: Creando directorio de Estadisticas.
      ansible.builtin.file:
        path: /var/www/html/stats/
        owner: www-data
        group: www-data
        mode: 0755
        state: directory

    - name: Ejecutando GooAccess en segundo plan
      shell: mv adminer-4.8.1-mysql.php  /var/www/html/adminer/index.php

    - name: Creando directorio de Claves
      ansible.builtin.file:
        path: /etc/apache2/keys
        state: directory

    - name: Creando usuarios para analizar estadisticas
      community.general.htpasswd:
        path: /etc/apache2/keys/.htpasswd
        name: '{{ STATS_USER_1 }}'
        password: '{{ STATS_PASSWORD_USER_1 }}'
        owner: root
        group: www-data
        mode: 0640

    - name: Creando archivo .htaccess
      ansible.builtin.file:
        path: /var/www/html/stats/.htaccess
        state: touch

    - name: Creando contenido de .htaccess
      ansible.builtin.blockinfile:
        path: /var/www/html/stats/.htaccess
        block: |
          AuthType Basic
          AuthName "Acceso restringido"
          AuthBasicProvider file
          AuthUserFile "/etc/apache2/keys/.htpasswd"
          Require valid-user

    - name: Creando contenido de 000-default.conf
      ansible.builtin.blockinfile:
        path: /var/www/html/stats/.htaccess
        block: |
          <Directory "/var/www/html/stats">
            AuthType Basic
            AuthName "Acceso restringido"
            AuthBasicProvider file
            AuthUserFile "/etc/apache2/keys/.htpasswd"
            Require valid-user
          </Directory>

    - name: Reiniciando Apache2.4
      ansible.builtin.service:
        name: apache2.service
        state: restarted



